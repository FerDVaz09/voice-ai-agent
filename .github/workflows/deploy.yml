name: 🎙️ Voice AI Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Usa Node.js 24 en las GitHub Actions (evita warning de deprecación de Node 20)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Verificar entorno
        run: |
          python --version
          python -c "import sys; print('sys.path:', sys.path)"
          python -c "from api.main import app; print('✅ Import api.main OK')"
          pytest --version

      - name: 🧪 Run tests
        run: pytest tests/ -v
        env:
          # Las variables son opcionales en tests unitarios (el engine está mockeado)
          # pero se inyectan desde Secrets para integración futura
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_PHONE_NUMBER_ID: ${{ secrets.VAPI_PHONE_NUMBER_ID }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          VAPI_WEBHOOK_SECRET: ${{ secrets.VAPI_WEBHOOK_SECRET }}
          OUTBOUND_API_KEY: ${{ secrets.OUTBOUND_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
