name: 🎙️ Voice AI Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Apunta a la DB de servicio definida abajo
      DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/voice_ai

    # Servicio de PostgreSQL para que el lifespan y los tests tengan BD real
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: voice_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Verificar entorno
        run: |
          python --version
          python -c "from api.main import app; print('✅ Import api.main OK')"
          pytest --version

      - name: 🧪 Run tests
        run: pytest tests/ -v --tb=short
        env:
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_PHONE_NUMBER_ID: ${{ secrets.VAPI_PHONE_NUMBER_ID }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          VAPI_WEBHOOK_SECRET: ${{ secrets.VAPI_WEBHOOK_SECRET }}
          OUTBOUND_API_KEY: ${{ secrets.OUTBOUND_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
