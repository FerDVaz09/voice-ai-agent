name: 🎙️ Voice AI Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # PYTHONPATH a nivel de job: disponible en TODOS los pasos,
      # incluido cuando pytest carga conftest.py por primera vez
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Verificar entorno
        run: |
          python --version
          python -c "import sys; print('PYTHONPATH OK, api importable:', 'api' in str(sys.path))"
          python -c "from api.main import app; print('✅ Import api.main OK')"
          pytest --version

      - name: 🧪 Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_PHONE_NUMBER_ID: ${{ secrets.VAPI_PHONE_NUMBER_ID }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          VAPI_WEBHOOK_SECRET: ${{ secrets.VAPI_WEBHOOK_SECRET }}
          OUTBOUND_API_KEY: ${{ secrets.OUTBOUND_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
